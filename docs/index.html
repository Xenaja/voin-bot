<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Саша Боцман — Код воина</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d0d;
      color: #fff;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      padding: 40px 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .photo-wrap {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #c9a84c;
      box-shadow: 0 0 40px rgba(201, 168, 76, 0.25);
      margin-bottom: 28px;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .name {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 8px;
    }

    .title {
      font-size: 15px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 32px;
    }

    .text {
      font-size: 19px;
      line-height: 1.7;
      color: #d9d0c0;
      margin-bottom: 36px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 6px;
      font-size: 18px;
      font-family: 'Arial', sans-serif;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-tg {
      background-color: #c9a84c;
      color: #0d0d0d;
    }

    .btn-vk {
      background-color: transparent;
      color: #c9a84c;
      border: 1.5px solid #c9a84c;
    }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="photo-wrap">
      <img src="photo-sasha.JPG" alt="Саша Боцман">
    </div>

    <div class="name">Саша Боцман</div>
    <div class="title">Код воина</div>

    <p class="text">
      Чтобы продолжить, жми на кнопку ниже
    </p>

    <div class="buttons">
      <a id="tg-btn" href="https://t.me/VoinKodBot" class="btn btn-tg">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-2.044 9.63c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 14.31l-2.95-.924c-.64-.204-.657-.64.136-.95l11.57-4.461c.537-.194 1.006.131.968.246z"/>
        </svg>
        Telegram
      </a>
    </div>

    <script>
      const source = new URLSearchParams(window.location.search).get('utm');
      if (source) {
        document.getElementById('tg-btn').href = 'https://t.me/VoinKodBot?start=' + source;
      }
    </script>

  </div>
</body>
</html>
