<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Саша Боцман — Код воина</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d0d;
      color: #fff;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      padding: 40px 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .photo-wrap {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #c9a84c;
      box-shadow: 0 0 40px rgba(201, 168, 76, 0.25);
      margin-bottom: 28px;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .name {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 8px;
    }

    .title {
      font-size: 15px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 32px;
    }

    .text {
      font-size: 19px;
      line-height: 1.7;
      color: #d9d0c0;
      margin-bottom: 36px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 6px;
      font-size: 18px;
      font-family: 'Arial', sans-serif;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-tg {
      background-color: #c9a84c;
      color: #0d0d0d;
    }

    .btn-vk {
      background-color: transparent;
      color: #c9a84c;
      border: 1.5px solid #c9a84c;
    }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="photo-wrap">
      <img src="photo-sasha.JPG" alt="Саша Боцман">
    </div>

    <div class="name">Саша Боцман</div>
    <div class="title">Код воина</div>

    <p class="text">
      Чтобы продолжить, выбери, где тебе удобно сейчас получать мои сообщения:
    </p>

    <div class="buttons">
      <a href="https://t.me/voin_kod_bot?start=start" class="btn btn-tg">
        <svg viewBox="0 0 24 24" fill="currentColor">

        </svg>
        ВКонтакте

    </div>

  </div>
</body>
</html>
